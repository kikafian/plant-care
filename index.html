<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f1a0f">
  <title>Plant Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d180d; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.07);
      --text: #c8d8a8; --text-dim: #6a7a58; --text-faint: #3a4a30;
      --accent: #7ab050; --ok: #70b850; --soon: #d4a840; --overdue: #d46050;
      --fert: #a07de0;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: "DM Mono", monospace; overscroll-behavior: none; }
    body {
      background-image: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(40,80,20,0.25) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(20,50,10,0.2) 0%, transparent 60%);
      min-height: 100vh;
    }
    body::before { content:""; position:fixed; inset:0; background-image:radial-gradient(circle,rgba(120,180,80,0.06) 1px,transparent 1px); background-size:24px 24px; pointer-events:none; z-index:0; }
    .app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 0 80px; }

    header { padding:52px 24px 24px; text-align:center; border-bottom:1px solid var(--border); margin-bottom:16px; }
    .date-label { font-size:10px; letter-spacing:4px; color:var(--accent); text-transform:uppercase; margin-bottom:10px; }
    h1 { font-family:"Playfair Display",serif; font-size:36px; font-weight:400; color:#d8e8b8; letter-spacing:-0.5px; }
    h1 em { font-style:italic; color:var(--accent); }
    .subtitle { font-size:11px; color:var(--text-dim); margin-top:6px; letter-spacing:1px; }

    .banner { margin:0 16px 16px; padding:10px 16px; border-radius:10px; font-size:12px; letter-spacing:0.5px; }
    .banner.ok   { background:rgba(80,160,40,0.1); border:1px solid rgba(80,160,40,0.2); color:var(--ok); }
    .banner.warn { background:rgba(200,80,60,0.1); border:1px solid rgba(200,80,60,0.2); color:var(--overdue); }
    .banner.soon { background:rgba(200,160,40,0.1); border:1px solid rgba(200,160,40,0.2); color:var(--soon); }

    /* Tab bar */
    .tabs { display:flex; gap:6px; padding:0 16px; margin-bottom:14px; }
    .tab { flex:1; padding:8px 0; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-family:"DM Mono",monospace; font-size:11px; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; }
    .tab.active.water { border-color:var(--accent); background:rgba(120,180,60,0.12); color:var(--accent); }
    .tab.active.fert  { border-color:var(--fert);   background:rgba(160,125,224,0.12); color:var(--fert); }

    .sort-bar { display:flex; gap:6px; padding:0 16px; margin-bottom:12px; justify-content:flex-end; }
    .sort-btn { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-family:"DM Mono",monospace; font-size:11px; cursor:pointer; transition:all 0.2s; }
    .sort-btn.active { border-color:var(--accent); background:rgba(120,180,60,0.12); color:var(--accent); }
    .sort-btn.active.fert-sort { border-color:var(--fert); background:rgba(160,125,224,0.12); color:var(--fert); }

    .list { padding:0 16px; display:flex; flex-direction:column; gap:10px; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; animation:slideIn 0.3s ease both; }
    .card.overdue { border-color:rgba(200,80,60,0.3); }
    .card.soon    { border-color:rgba(200,160,40,0.25); }
    .card.fert-overdue { border-color:rgba(160,125,224,0.4); }
    .card.fert-soon    { border-color:rgba(160,125,224,0.25); }

    .card-top { display:flex; align-items:stretch; }
    .plant-photo { width:80px; min-height:80px; flex-shrink:0; object-fit:cover; display:block; }
    .card-body { flex:1; padding:12px 10px 12px 14px; display:flex; flex-direction:column; justify-content:center; min-width:0; }
    .plant-name { font-family:"Playfair Display",serif; font-size:15px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .plant-latin { font-size:10px; color:var(--text-faint); font-style:italic; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .status-row { display:flex; align-items:center; gap:7px; margin-top:6px; }
    .bar-track { flex:1; height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; max-width:80px; }
    .bar-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }
    .status-label { font-size:10px; letter-spacing:0.3px; flex-shrink:0; }
    .meta-row { font-size:9px; color:var(--text-faint); margin-top:3px; }

    /* fert row */
    .fert-row { display:flex; align-items:center; gap:7px; margin-top:4px; }
    .fert-label-tag { font-size:9px; color:var(--fert); opacity:0.7; flex-shrink:0; }

    .actions { display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center; padding:10px 10px 10px 0; flex-shrink:0; }
    .action-btn {
      width:40px; height:40px; border-radius:50%; border:1px solid; font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
    }
    .water-action { border-color:rgba(120,180,60,0.3); background:rgba(80,130,30,0.15); color:var(--ok); }
    .water-action.overdue { border-color:rgba(200,80,60,0.4); background:rgba(160,50,30,0.15); color:var(--overdue); }
    .fert-action  { border-color:rgba(160,125,224,0.3); background:rgba(120,90,180,0.12); color:var(--fert); }
    .fert-action.overdue { border-color:rgba(160,125,224,0.5); background:rgba(120,90,180,0.2); color:var(--fert); }
    .action-btn:active { transform:scale(0.88); }
    .action-btn.watered { animation:pulse 0.4s ease; }

    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(1)} }

    #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:#2a4a1a; color:#a8d080; padding:10px 22px; border-radius:30px; font-size:13px; font-family:"Playfair Display",serif; border:1px solid rgba(120,180,60,0.3); box-shadow:0 4px 24px rgba(0,0,0,0.5); z-index:999; opacity:0; transition:opacity 0.25s,transform 0.25s; white-space:nowrap; }
    #toast.fert { background:#2a1a4a; color:#c0a8f0; border-color:rgba(160,125,224,0.3); }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="date-label" id="date-label"></div>
    <h1>Plant <em>Journal</em></h1>
    <div class="subtitle">13 plants · watering &amp; fertilizing</div>
  </header>
  <div class="banner" id="banner"></div>
  <div class="tabs">
    <button class="tab active water" onclick="setTab('water')">💧 Watering</button>
    <button class="tab fert"         onclick="setTab('fert')">🌿 Fertilizing</button>
  </div>
  <div class="sort-bar">
    <button class="sort-btn active" id="sort-urgency" onclick="setSort('urgency')">By urgency</button>
    <button class="sort-btn" id="sort-name" onclick="setSort('name')">A–Z</button>
  </div>
  <div class="list" id="list"></div>
</div>
<div id="toast"></div>

const KEY_W = "plant-watering-v1";
const KEY_F = "plant-fert-v1";
let logW = {}, logF = {};
let sortMode = "urgency";
let activeTab = "water";
let toastTimer = null;

function load() {
  try { logW = JSON.parse(localStorage.getItem(KEY_W)) || {}; } catch(e) { logW={}; }
  try { logF = JSON.parse(localStorage.getItem(KEY_F)) || {}; } catch(e) { logF={}; }
}
function save() {
  localStorage.setItem(KEY_W, JSON.stringify(logW));
  localStorage.setItem(KEY_F, JSON.stringify(logF));
}
function today() { return new Date().toISOString().split("T")[0]; }
function daysSince(d) {
  if (!d) return null;
  return Math.floor((new Date().setHours(0,0,0,0) - new Date(d+"T00:00:00").setHours(0,0,0,0)) / 86400000);
}
function getStatus(log, intervalDays, p) {
  const since = daysSince(log[p.id]);
  if (since===null) return {level:"unknown",label:"Never done",pct:0};
  const left = intervalDays - since;
  if (left<=0) return {level:"overdue",label:`${Math.abs(left)}d overdue`,pct:100};
  if (left<=3) return {level:"soon",   label:`Due in ${left}d`,pct:Math.round(since/intervalDays*100)};
  return             {level:"ok",     label:`${left}d left`,  pct:Math.round(since/intervalDays*100)};
}

const waterColor = l => ({ok:"#70b850",soon:"#d4a840",overdue:"#d46050",unknown:"#5a6a50"})[l];
const fertColor  = l => ({ok:"#a07de0",soon:"#a07de0",overdue:"#a07de0",unknown:"#7a5ab0"})[l];

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.querySelector(`.tab.${tab}`).classList.add("active");
  document.getElementById("sort-urgency").className = "sort-btn active" + (tab==="fert"?" fert-sort":"");
  render();
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById("sort-urgency").classList.toggle("active", mode==="urgency");
  document.getElementById("sort-name").classList.toggle("active", mode==="name");
  render();
}

function waterPlant(id) {
  logW[id] = today(); save();
  const p = PLANTS.find(p=>p.id===id);
  showToast(`${p.name} watered! 💧`, false);
  animBtn(`wbtn-${id}`); render();
}

function fertPlant(id) {
  logF[id] = today(); save();
  const p = PLANTS.find(p=>p.id===id);
  showToast(`${p.name} fertilized! 🌿`, true);
  animBtn(`fbtn-${id}`); render();
}

function animBtn(id) {
  const b = document.getElementById(id);
  if (b) { b.classList.add("watered"); setTimeout(()=>b.classList.remove("watered"),500); }
}

function showToast(msg, isFert) {
  const t = document.getElementById("toast");
  t.textContent=msg; t.className = isFert ? "fert show" : "show";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"),2500);
}

function fmtDate(s) {
  if (!s) return null;
  return new Date(s+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}

function fertLabel(days) {
  if (days===14) return "every 2 weeks";
  if (days===21) return "every 3 weeks";
  if (days===28) return "every 4 weeks";
  if (days===35) return "every 5 weeks";
  if (days===42) return "every 6 weeks";
  if (days===56) return "every 8 weeks";
  return `every ${days}d`;
}

function render() {
  document.getElementById("date-label").textContent =
    new Date().toLocaleDateString("en-GB",{month:"long",year:"numeric"}).toUpperCase();

  const isFert = activeTab === "fert";
  const enriched = PLANTS.map(p => ({
    ...p,
    ws: getStatus(logW, p.days, p),
    fs: getStatus(logF, p.fertDays, p),
  }));

  const order = {overdue:0,unknown:1,soon:2,ok:3};
  const getActiveStatus = p => isFert ? p.fs : p.ws;
  const sorted = [...enriched].sort((a,b) => {
    if (sortMode==="urgency") {
      const d = order[getActiveStatus(a).level] - order[getActiveStatus(b).level];
      return d || a.name.localeCompare(b.name);
    }
    return a.name.localeCompare(b.name);
  });

  const activeStatus = p => getActiveStatus(p);
  const overdue = enriched.filter(p=>activeStatus(p).level==="overdue").length;
  const soon    = enriched.filter(p=>activeStatus(p).level==="soon").length;
  const banner  = document.getElementById("banner");
  const thing = isFert ? "fertilize" : "water";
  if (overdue>0) { banner.className="banner warn"; banner.innerHTML=`⚠ ${overdue} plant${overdue>1?"s":""} need ${thing} now`; }
  else if (soon>0){ banner.className="banner soon"; banner.innerHTML=`⏳ ${soon} plant${soon>1?"s":""} due soon`; }
  else            { banner.className="banner ok";   banner.innerHTML=`✓ All plants on track`; }

  document.getElementById("list").innerHTML = sorted.map((p,i) => {
    const ws = p.ws, fs = p.fs;
    const wCol = waterColor(ws.level);
    const fCol = fertColor(fs.level);
    const mainStatus = isFert ? fs : ws;
    const cardClass = isFert
      ? (fs.level==="overdue"?"fert-overdue":fs.level==="soon"?"fert-soon":"")
      : (ws.level==="overdue"?"overdue":ws.level==="soon"?"soon":"");
    const wLast = logW[p.id] ? `Watered: ${fmtDate(logW[p.id])}` : `Water every ~${p.days}d`;
    const fLast = logF[p.id] ? `Fertilized: ${fmtDate(logF[p.id])}` : fertLabel(p.fertDays);

    return `<div class="card ${cardClass}" style="animation-delay:${i*25}ms">
      <div class="card-top">
        <img class="plant-photo" src="${p.photo}" alt="${p.name}" loading="lazy">
        <div class="card-body">
          <div class="plant-name">${p.name}</div>
          <div class="plant-latin">${p.latin}</div>
          <div class="status-row">
            <div class="bar-track"><div class="bar-fill" style="width:${ws.pct}%;background:${wCol};opacity:0.75"></div></div>
            <span class="status-label" style="color:${wCol}">💧 ${ws.label}</span>
          </div>
          <div class="status-row">
            <div class="bar-track"><div class="bar-fill" style="width:${fs.pct}%;background:${fCol};opacity:0.65"></div></div>
            <span class="status-label" style="color:${fCol}">🌿 ${fs.label}</span>
          </div>
          <div class="meta-row">${isFert ? fLast : wLast}</div>
        </div>
        <div class="actions">
          <button class="action-btn water-action${ws.level==="overdue"?" overdue":""}" id="wbtn-${p.id}" onclick="waterPlant(${p.id})" title="Water">💧</button>
          <button class="action-btn fert-action${fs.level==="overdue"?" overdue":""}"  id="fbtn-${p.id}" onclick="fertPlant(${p.id})"  title="Fertilize">🌿</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

load(); render();
setInterval(render, 60000);
</script>
</body>
</html>
